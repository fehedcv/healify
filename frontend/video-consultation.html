<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Consultation - Healify</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        .consultation-container {
            display: flex;
            height: 100vh;
            background: #fff;
            overflow: hidden;
        }

        #jitsiConference {
            flex: 1;
            width: 100%;
            height: 100%;
            min-height: 600px;
            position: relative;
        }

        .sidebar {
            width: 300px;
            background: white;
            border-left: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid #ddd;
        }

        .sidebar-header h3 {
            margin: 0;
            color: #333;
        }

        .consultation-info {
            padding: 1rem;
            background: #f9f9f9;
            border-bottom: 1px solid #ddd;
        }

        .info-item {
            font-size: 0.9rem;
            margin: 0.5rem 0;
            color: #666;
        }

        .back-button {
            padding: 1rem;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            border-radius: 5px;
            transition: background 0.3s;
            width: calc(100% - 2rem);
            margin: 1rem;
        }

        .back-button:hover {
            background: #5568d3;
        }

        @media (max-width: 768px) {
            .consultation-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                border-left: none;
                border-top: 1px solid #ddd;
                max-height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="consultation-container">
        <!-- Jitsi Conference Area -->
        <div id="jitsiConference"></div>

        <!-- Sidebar - Info -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Consultation Info</h3>
            </div>

            <div class="consultation-info">
                <div class="info-item"><strong>Room ID:</strong> <span id="roomId">Loading...</span></div>
                <div class="info-item"><strong>Status:</strong> <span id="status">Connecting...</span></div>
                <div class="info-item"><strong>Participants:</strong> <span id="participantCount">1</span></div>
            </div>

            <button class="back-button" id="endCallBtn" onclick="goBack()">End Consultation</button>
        </div>
    </div>

    <script type="module" src="./firebase-config.js"></script>
    <script type="module" src="./jitsi-video-call.js"></script>
</body>
</html>
