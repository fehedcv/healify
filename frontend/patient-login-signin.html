<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Patient Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <h2>Patient Login</h2>
    <div class="form-group">
      <input type="email" id="email" placeholder="Email">
    </div>
    <div class="form-group">
      <input type="password" id="password" placeholder="Password">
    </div>
    <button id="loginBtn" class="btn btn-primary btn-full">Login</button>
    <p id="error" class="error-text"></p>
    <div class="form-divider">
      <span>or</span>
    </div>
    <button class="btn btn-secondary btn-full" onclick="window.location.href='patient-login.html'">New? Register</button>
  </div>
</div>

<script type="module" src="./firebase-config.js"></script>
<script type="module" src="./patient-auth.js"></script>

</body>
</html>
